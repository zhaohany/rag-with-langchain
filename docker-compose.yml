services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      # Named volume: database files survive container stop/restart/recreate.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    environment:
      RAG_ENV: docker
      RAG_CORS_ORIGINS: '["http://127.0.0.1:5173", "http://localhost:5173", "http://127.0.0.1:8080", "http://localhost:8080"]'
      # Optional future Postgres connection string.
      # The current backend still uses SQLite unless students implement Postgres support.
      DATABASE_URL: postgresql://rag_user:rag_password@postgres:5432/rag
    ports:
      - "8000:8000"
    volumes:
      # Keeps FAISS index, SQLite metadata, uploaded docs, and prompt files across restarts.
      - rag_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
    container_name: rag-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  rag_data:
